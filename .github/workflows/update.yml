name: daily-data-update

on:
  schedule:
    - cron: "30 22 * * *"   # UTC 22:30 = 北京/新加坡 06:30(美股收盘EOD+隔夜新闻)
    - cron: "35 0 * * *"    # UTC 00:35 = 北京/新加坡 08:35(UTC午夜刚过,补抓最新完整日token数据)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "data/**"   # 数据提交不触发(双保险,GITHUB_TOKEN 推送本身也不会触发)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 抓取全部数据(纯标准库,无需装依赖)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEOSCOPE_API_KEY: ${{ secrets.GEOSCOPE_API_KEY }}
        run: python3 scripts/fetch_all.py

      - name: 提交数据更新
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "数据无变化,跳过提交"
          else
            git commit -m "data: auto update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
